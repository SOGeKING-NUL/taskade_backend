name: Deploy to Hugging Face Spaces


on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Crucial: allows GitHub to request the OIDC token
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face CLI
        run: curl -LsSf https://hf.co/cli/install.sh | bash

      - name: Sync to Hugging Face Spaces
        env:
          HF_OIDC_RESOURCE: SOGe2020/taskade-backend
          HF_OIDC_RESOURCE: spaces/SOGe2020/taskade-backend
        run: |
          # Upload current directory contents directly to the Hugging Face Space
          hf upload SOGe2020/taskade-backend . . --repo-type=space

